<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenMower Zone Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #toolbar { background: #2d2d3f; padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #toolbar .toolbar-title { color: #fff; font-weight: bold; margin-right: 12px; font-size: 1.1em; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 280px; background: #1e1e2e; color: #cdd6f4; overflow-y: auto; padding: 0; display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar-header { padding: 12px 16px; background: #181825; font-weight: bold; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; color: #89b4fa; }
    #zone-list { flex: 1; overflow-y: auto; }
    .zone-item { padding: 10px 16px; border-bottom: 1px solid #313244; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .zone-item:hover { background: #313244; }
    .zone-item.selected { background: #45475a; }
    .zone-item .zone-name { flex: 1; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .zone-badge { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; color: #fff; flex-shrink: 0; }
    #edit-panel { padding: 16px; border-top: 2px solid #313244; background: #181825; }
    #edit-panel h6 { color: #89b4fa; margin-bottom: 12px; }
    #map-container { flex: 1; }
    #map { height: 100%; width: 100%; }
    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; }
    #active-draw-mode { color: #a6e3a1; font-size: 0.85em; }
    .leaflet-draw-tooltip { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="toolbar-title">🌿 OpenMower Zone Editor</span>
    <button class="btn btn-sm btn-success" onclick="startDraw('operation')">+ Mow Zone</button>
    <button class="btn btn-sm btn-primary" onclick="startDraw('navigation')">+ Nav Zone</button>
    <button class="btn btn-sm btn-danger" onclick="startDraw('exclusion')">+ Exclusion</button>
    <button class="btn btn-sm btn-warning" onclick="startAddDock()">+ Dock</button>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span id="active-draw-mode"></span>
      <button class="btn btn-sm btn-outline-light" onclick="saveAll()">💾 Save All</button>
    </div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">Zones</div>
      <div id="zone-list"></div>
      <div id="edit-panel" style="display:none;">
        <h6>Edit Zone</h6>
        <div class="mb-2">
          <label class="form-label text-light" style="font-size:0.85em;">Name</label>
          <input type="text" id="edit-name" class="form-control form-control-sm bg-dark text-light border-secondary">
        </div>
        <div class="mb-2" id="edit-type-group">
          <label class="form-label text-light" style="font-size:0.85em;">Type</label>
          <select id="edit-type" class="form-select form-select-sm bg-dark text-light border-secondary">
            <option value="operation">Mow Zone (operation)</option>
            <option value="navigation">Nav Zone (navigation)</option>
            <option value="exclusion">Exclusion (exclusion)</option>
          </select>
        </div>
        <div class="mb-2" id="edit-heading-group" style="display:none;">
          <label class="form-label text-light" style="font-size:0.85em;">Heading (degrees)</label>
          <input type="number" id="edit-heading" class="form-control form-control-sm bg-dark text-light border-secondary" min="0" max="360" step="1">
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-sm btn-primary flex-fill" onclick="applyEdit()">Apply</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSelected()">Delete</button>
        </div>
      </div>
    </div>
    <div id="map-container">
      <div id="map"></div>
    </div>
  </div>
</div>

<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let mapData = { type: "FeatureCollection", features: [] };
let layerMap = {};       // featureId → Leaflet layer
let selectedId = null;
let map = null;
let drawnItems = null;
let activeDrawHandler = null;
let dockClickHandler = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function typeColor(type) {
  const colors = {
    operation: "#00ff00",
    navigation: "#0000ff",
    exclusion: "#ff0000",
    docking_station: "#ff8800"
  };
  return colors[type] || "#888888";
}

function typeLabel(type) {
  const labels = {
    operation: "Mow",
    navigation: "Nav",
    exclusion: "Excl",
    docking_station: "Dock"
  };
  return labels[type] || type;
}

function defaultName() {
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  return `area_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
}

// GeoJSON [lng,lat] coords array → Leaflet [lat,lng] latlngs (skips closing point)
function geoJSONToLatLngs(coords) {
  // coords is array of [lng, lat] for a polygon ring; skip last if it closes the ring
  const ring = coords[0];
  const latlngs = ring.slice(0, -1).map(c => [c[1], c[0]]);
  return latlngs;
}

// Leaflet latlngs → GeoJSON polygon coords (closed ring, [lng,lat])
function latlngsToGeoJSON(latlngs) {
  const ring = latlngs.map(ll => [ll.lng, ll.lat]);
  ring.push(ring[0]); // close the ring
  return [ring];
}

// ── Map Init ───────────────────────────────────────────────────────────────
async function init() {
  // Fetch datum for map center
  let center = [30.0, 0.5];
  try {
    const res = await fetch("/api/datum");
    const datum = await res.json();
    center = [datum.lat, datum.lng];
  } catch (e) {
    console.warn("Could not fetch datum, using defaults", e);
  }

  map = L.map("map").setView(center, 18);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 22
  }).addTo(map);

  drawnItems = new L.FeatureGroup();
  map.addLayer(drawnItems);

  // Load existing map data
  try {
    const res = await fetch("/api/map");
    mapData = await res.json();
    if (!mapData.features) mapData.features = [];
  } catch (e) {
    console.warn("Could not load map data", e);
  }

  renderFeatures();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderFeatures() {
  // Remove all existing layers
  Object.values(layerMap).forEach(l => {
    if (map.hasLayer(l)) map.removeLayer(l);
    if (drawnItems.hasLayer(l)) drawnItems.removeLayer(l);
  });
  layerMap = {};

  mapData.features.forEach(feature => addLayerForFeature(feature));
  rebuildZoneList();
}

function addLayerForFeature(feature) {
  const id = feature.id;
  const type = feature.properties.type;
  const color = typeColor(type);
  let layer;

  if (feature.geometry.type === "Point") {
    const coords = feature.geometry.coordinates; // [lng, lat]
    const icon = L.divIcon({
      className: "",
      html: `<div style="width:14px;height:14px;background:${color};border:2px solid #fff;border-radius:50%;"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
    layer = L.marker([coords[1], coords[0]], { icon });
  } else {
    const latlngs = geoJSONToLatLngs(feature.geometry.coordinates);
    layer = L.polygon(latlngs, {
      color: color,
      fillColor: color,
      fillOpacity: 0.25,
      weight: 2
    });
  }

  layer.on("click", () => selectFeature(id));
  drawnItems.addLayer(layer);
  layerMap[id] = layer;
}

// ── Zone List ──────────────────────────────────────────────────────────────
function rebuildZoneList() {
  const list = document.getElementById("zone-list");
  list.innerHTML = "";

  mapData.features.forEach(feature => {
    const id = feature.id;
    const name = feature.properties.name || id;
    const type = feature.properties.type;
    const color = typeColor(type);

    const item = document.createElement("div");
    item.className = "zone-item" + (selectedId === id ? " selected" : "");
    item.dataset.id = id;
    item.innerHTML = `
      <span class="zone-badge" style="background:${color};">${typeLabel(type)}</span>
      <span class="zone-name" title="${name}">${name}</span>
    `;
    item.addEventListener("click", () => {
      selectFeature(id);
      const layer = layerMap[id];
      if (layer) {
        if (layer.getBounds) {
          map.fitBounds(layer.getBounds(), { padding: [40, 40] });
        } else if (layer.getLatLng) {
          map.setView(layer.getLatLng(), 20);
        }
      }
    });
    list.appendChild(item);
  });
}

// ── Selection ──────────────────────────────────────────────────────────────
function selectFeature(id) {
  // Deselect previous
  if (selectedId && layerMap[selectedId]) {
    const prev = layerMap[selectedId];
    const prevFeature = mapData.features.find(f => f.id === selectedId);
    if (prevFeature && prev.setStyle) {
      const color = typeColor(prevFeature.properties.type);
      prev.setStyle({ color, dashArray: null, weight: 2 });
    }
  }

  selectedId = id;
  const feature = mapData.features.find(f => f.id === id);
  const layer = layerMap[id];

  if (layer && layer.setStyle) {
    layer.setStyle({ color: "#f5c542", dashArray: "6 4", weight: 3 });
  }

  // Update sidebar selection highlight
  document.querySelectorAll(".zone-item").forEach(el => {
    el.classList.toggle("selected", el.dataset.id === id);
  });

  // Populate edit panel
  const panel = document.getElementById("edit-panel");
  const isDock = feature && feature.properties.type === "docking_station";

  if (feature) {
    document.getElementById("edit-name").value = feature.properties.name || "";
    document.getElementById("edit-type").value = feature.properties.type || "operation";
    document.getElementById("edit-type-group").style.display = isDock ? "none" : "";
    document.getElementById("edit-heading-group").style.display = isDock ? "" : "none";
    if (isDock) {
      document.getElementById("edit-heading").value = feature.properties.heading || 0;
    }
    panel.style.display = "";
  } else {
    panel.style.display = "none";
  }
}

// ── Apply Edit ─────────────────────────────────────────────────────────────
function applyEdit() {
  if (!selectedId) return;
  const feature = mapData.features.find(f => f.id === selectedId);
  if (!feature) return;

  const newName = document.getElementById("edit-name").value.trim() || feature.properties.name;
  const isDock = feature.properties.type === "docking_station";

  feature.properties.name = newName;

  if (!isDock) {
    const newType = document.getElementById("edit-type").value;
    feature.properties.type = newType;

    const layer = layerMap[selectedId];
    if (layer && layer.setStyle) {
      const color = typeColor(newType);
      layer.setStyle({ color, fillColor: color, dashArray: "6 4", weight: 3, fillOpacity: 0.25 });
    }
  } else {
    feature.properties.heading = parseFloat(document.getElementById("edit-heading").value) || 0;
  }

  rebuildZoneList();
  showToast("Changes applied. Don't forget to Save All.", true);
}

// ── Delete ─────────────────────────────────────────────────────────────────
function deleteSelected() {
  if (!selectedId) return;
  const layer = layerMap[selectedId];
  if (layer) {
    drawnItems.removeLayer(layer);
    if (map.hasLayer(layer)) map.removeLayer(layer);
  }
  delete layerMap[selectedId];
  mapData.features = mapData.features.filter(f => f.id !== selectedId);
  selectedId = null;
  document.getElementById("edit-panel").style.display = "none";
  rebuildZoneList();
}

// ── Draw ───────────────────────────────────────────────────────────────────
function cancelActiveHandlers() {
  if (activeDrawHandler) {
    activeDrawHandler.disable();
    activeDrawHandler = null;
  }
  if (dockClickHandler) {
    map.off("click", dockClickHandler);
    dockClickHandler = null;
  }
  document.getElementById("active-draw-mode").textContent = "";
}

function startDraw(type) {
  cancelActiveHandlers();

  const color = typeColor(type);
  const labels = { operation: "Mow Zone", navigation: "Nav Zone", exclusion: "Exclusion" };
  document.getElementById("active-draw-mode").textContent = `Drawing: ${labels[type] || type}`;

  activeDrawHandler = new L.Draw.Polygon(map, {
    shapeOptions: {
      color: color,
      fillColor: color,
      fillOpacity: 0.25,
      weight: 2
    },
    showArea: false,
    allowIntersection: false
  });
  activeDrawHandler.enable();

  // Listen once for the draw:created event
  map.once("draw:created", function(e) {
    activeDrawHandler = null;
    document.getElementById("active-draw-mode").textContent = "";
    addFeatureFromLayer(e.layer, type);
  });
}

function addFeatureFromLayer(layer, type) {
  const latlngs = layer.getLatLngs()[0];
  const coords = latlngsToGeoJSON(latlngs);
  const id = crypto.randomUUID();
  const name = defaultName();

  const feature = {
    id: id,
    type: "Feature",
    properties: { name, type },
    geometry: { type: "Polygon", coordinates: coords }
  };

  mapData.features.push(feature);
  addLayerForFeature(feature);
  rebuildZoneList();
  selectFeature(id);
}

// ── Add Dock ───────────────────────────────────────────────────────────────
function startAddDock() {
  cancelActiveHandlers();
  document.getElementById("active-draw-mode").textContent = "Click map to place dock…";
  map.getContainer().style.cursor = "crosshair";

  dockClickHandler = function(e) {
    map.off("click", dockClickHandler);
    dockClickHandler = null;
    map.getContainer().style.cursor = "";
    document.getElementById("active-draw-mode").textContent = "";

    const name = prompt("Dock name:", "docking_station") || "docking_station";
    const headingStr = prompt("Dock heading (degrees, 0–360):", "0");
    const heading = parseFloat(headingStr) || 0;
    const id = crypto.randomUUID();

    const feature = {
      id: id,
      type: "Feature",
      properties: { name, type: "docking_station", heading },
      geometry: { type: "Point", coordinates: [e.latlng.lng, e.latlng.lat] }
    };

    mapData.features.push(feature);
    addLayerForFeature(feature);
    rebuildZoneList();
    selectFeature(id);
  };

  map.on("click", dockClickHandler);
}

// ── Save All ───────────────────────────────────────────────────────────────
async function saveAll() {
  try {
    const res = await fetch("/api/map", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(mapData)
    });
    const data = await res.json();
    if (data.status === "ok") {
      showToast("✅ Map saved successfully!", true);
    } else {
      showToast("⚠️ Save returned unexpected response.", false);
    }
  } catch (e) {
    showToast("❌ Save failed: " + e.message, false);
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, success) {
  const toastEl = document.getElementById("toast");
  const toastMsg = document.getElementById("toast-msg");
  toastMsg.textContent = msg;
  toastEl.classList.remove("bg-success", "bg-danger");
  toastEl.classList.add(success ? "bg-success" : "bg-danger");
  const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3000 });
  toast.show();
}

// ── Cancel draw on Escape ──────────────────────────────────────────────────
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") cancelActiveHandlers();
});

// ── Bootstrap ─────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
